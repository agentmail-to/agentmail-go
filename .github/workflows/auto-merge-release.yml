name: Auto-merge release

on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'stainless-app[bot]' && startsWith(github.head_ref, 'release-please--')
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          gh pr review "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --approve
          gh pr merge "${{ github.event.pull_request.number }}" --repo "$GITHUB_REPOSITORY" --squash --auto
